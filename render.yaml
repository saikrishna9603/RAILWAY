services:
  - type: web
    name: tatkal-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main_api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    numInstances: 1
    envVars:
      - key: MONGODB_URI
        scope: run
        sync: false
      - key: JWT_SECRET
        scope: run
        sync: false
      - key: CORS_ORIGINS
        value: https://tatkal.vercel.app
